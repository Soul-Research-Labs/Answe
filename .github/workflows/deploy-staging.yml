name: Deploy Staging (Sepolia)

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  SCARB_VERSION: "2.16.0"
  SNFORGE_VERSION: "0.57.0"
  NODE_VERSION: "22"

jobs:
  # Gate: all tests must pass before deployment
  cairo-test:
    name: Cairo Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: ${{ env.SCARB_VERSION }}

      - name: Install Starknet Foundry
        uses: foundry-rs/setup-snfoundry@v3
        with:
          starknet-foundry-version: ${{ env.SNFORGE_VERSION }}

      - name: Build contracts
        run: scarb build

      - name: Run Cairo tests
        run: snforge test --workspace

  sdk-test:
    name: SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: sdk

      - name: Type check
        run: npx tsc --noEmit
        working-directory: sdk

      - name: Run SDK tests
        run: npx vitest run
        working-directory: sdk

  deploy-sepolia:
    name: Deploy to Sepolia
    runs-on: ubuntu-latest
    needs: [cairo-test, sdk-test]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: ${{ env.SCARB_VERSION }}

      - name: Install Starknet Foundry
        uses: foundry-rs/setup-snfoundry@v3
        with:
          starknet-foundry-version: ${{ env.SNFORGE_VERSION }}

      - name: Build contracts
        run: scarb build

      - name: Deploy to Sepolia
        env:
          STARKNET_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          STARKNET_ACCOUNT: ${{ secrets.SEPOLIA_ACCOUNT }}
          STARKNET_KEYSTORE: ${{ secrets.SEPOLIA_KEYSTORE }}
          STARKNET_PRIVATE_KEY: ${{ secrets.SEPOLIA_PRIVATE_KEY }}
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh --network sepolia

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sepolia-deployment-${{ github.sha }}
          path: scripts/deployments-sepolia.json
          retention-days: 90

      - name: Comment deployment addresses
        if: github.event_name == 'push'
        run: |
          if [ -f scripts/deployments-sepolia.json ]; then
            echo "### Sepolia Deployment" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat scripts/deployments-sepolia.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
